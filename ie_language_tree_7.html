<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>印欧語族マップ</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #16161d;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --text: #e8e6f0;
    --text-dim: #8884a0;
    --text-dimmer: #55526a;
    --accent: #c9a96e;
    --accent2: #7eb8c9;
    --accent3: #b87eb8;
    --accent4: #7ec98f;
    --accent5: #c97e7e;
    --accent6: #7e9bc9;
    --glow: rgba(201,169,110,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(201,169,110,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(126,184,201,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header {
    margin-bottom: 48px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 0.02em;
    margin-bottom: 8px;
  }

  header p {
    color: var(--text-dim);
    font-size: 0.85rem;
    letter-spacing: 0.05em;
  }

  /* Root node */
  .root-node {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
  }

  .root-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    background: var(--accent);
    color: var(--bg);
    padding: 4px 12px;
    border-radius: 2px;
    letter-spacing: 0.08em;
    font-weight: 500;
  }

  .root-label {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--text);
    font-style: italic;
  }

  /* Branch container */
  .branches {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Branch */
  .branch {
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .branch:hover {
    border-color: var(--text-dimmer);
  }

  .branch-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    background: var(--surface);
    transition: background 0.15s;
  }

  .branch-header:hover {
    background: var(--surface2);
  }

  .branch-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .branch-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 600;
    flex: 1;
  }

  .branch-sub {
    font-size: 0.78rem;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.03em;
  }

  .branch-toggle {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: var(--text-dimmer);
    transition: transform 0.25s;
    flex-shrink: 0;
  }

  .branch.open .branch-toggle {
    transform: rotate(90deg);
  }

  /* Branch body */
  .branch-body {
    display: none;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }

  .branch.open .branch-body {
    display: block;
  }

  /* Sub-branches */
  .sub-branches {
    padding: 12px 18px 16px 36px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .sub-branch {
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .sub-branch-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
    background: var(--bg);
    transition: background 0.15s;
  }

  .sub-branch-header:hover {
    background: var(--surface2);
  }

  .sub-branch-name {
    font-size: 0.9rem;
    font-weight: 500;
    flex: 1;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .sub-branch-langs {
    font-size: 0.75rem;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
  }

  .sub-branch-toggle {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-dimmer);
    transition: transform 0.25s;
  }

  .sub-branch.open .sub-branch-toggle {
    transform: rotate(90deg);
  }

  .sub-branch-body {
    display: none;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  .sub-branch.open .sub-branch-body {
    display: block;
  }

  /* Language list */
  .lang-list {
    padding: 12px 14px 14px 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .lang-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .lang-name {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
  }

  .lang-examples {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .example-chip {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 2px;
    border: 1px solid;
    letter-spacing: 0.03em;
  }

  .lang-note {
    font-size: 0.75rem;
    color: var(--text-dim);
    font-style: italic;
  }

  /* English highlight section */
  .english-section {
    margin-top: 4px;
    padding: 10px 14px;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }

  .english-label {
    font-size: 0.7rem;
    color: var(--text-dimmer);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .english-roots {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .root-chip {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 2px;
    background: rgba(201,169,110,0.1);
    border: 1px solid rgba(201,169,110,0.3);
    color: var(--accent);
    letter-spacing: 0.03em;
  }

  /* PIE note */
  .pie-note {
    margin-top: 8px;
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    font-size: 0.75rem;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
  }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 28px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Connector line */
  .connector {
    width: 2px;
    background: var(--border);
    margin: 0 0 0 3px;
    height: 16px;
  }
</style>
</head>

function makeChip(text, color, bg) {
  const span = document.createElement('span');
  span.className = 'example-chip';
  span.textContent = text;
  span.style.color = color;
  span.style.borderColor = color + '55';
  span.style.background = bg || 'transparent';
  return span;
}

function buildLangItem(lang, branchColor) {
  const item = document.createElement('div');
  item.className = 'lang-item';

  const name = document.createElement('div');
  name.className = 'lang-name';
  name.textContent = lang.name;
  item.appendChild(name);

  if (lang.note) {
    const note = document.createElement('div');
    note.className = 'lang-note';
    note.textContent = lang.note;
    item.appendChild(note);
  }

  if (lang.examples && lang.examples.length > 0) {
    const exDiv = document.createElement('div');
    exDiv.className = 'lang-examples';
    lang.examples.forEach(ex => {
      exDiv.appendChild(makeChip(ex, branchColor));
    });
    item.appendChild(exDiv);
  }

  if (lang.english && lang.english.length > 0) {
    const sec = document.createElement('div');
    sec.className = 'english-section';
    const label = document.createElement('div');
    label.className = 'english-label';
    label.textContent = '英語語根の例';
    sec.appendChild(label);
    const roots = document.createElement('div');
    roots.className = 'english-roots';
    lang.english.forEach(r => {
      const chip = document.createElement('span');
      chip.className = 'root-chip';
      chip.textContent = r;
      roots.appendChild(chip);
    });
    sec.appendChild(roots);
    item.appendChild(sec);
  }

  if (lang.pie) {
    const pie = document.createElement('div');
    pie.className = 'pie-note';
    pie.textContent = '印欧祖語: ' + lang.pie;
    item.appendChild(pie);
  }

  return item;
}

function buildSubBranch(group, branchColor) {
  const sb = document.createElement('div');
  sb.className = 'sub-branch';

  const header = document.createElement('div');
  header.className = 'sub-branch-header';

  const dot = document.createElement('div');
  dot.className = 'branch-dot';
  dot.style.background = branchColor + '88';
  dot.style.width = '6px';
  dot.style.height = '6px';

  const name = document.createElement('div');
  name.className = 'sub-branch-name';
  name.textContent = group.name;

  const langs = document.createElement('div');
  langs.className = 'sub-branch-langs';
  if (group.langs) langs.textContent = group.langs.join(' · ');

  const toggle = document.createElement('div');
  toggle.className = 'sub-branch-toggle';
  toggle.textContent = '▶';

  header.appendChild(dot);
  header.appendChild(name);
  header.appendChild(langs);
  header.appendChild(toggle);

  const body = document.createElement('div');
  body.className = 'sub-branch-body';

  const list = document.createElement('div');
  list.className = 'lang-list';
  group.children.forEach(lang => {
    list.appendChild(buildLangItem(lang, branchColor));
  });
  body.appendChild(list);

  header.addEventListener('click', () => {
    sb.classList.toggle('open');
  });

  sb.appendChild(header);
  sb.appendChild(body);
  return sb;
}

function buildBranch(branch) {
  const el = document.createElement('div');
  el.className = 'branch';

  const header = document.createElement('div');
  header.className = 'branch-header';

  const dot = document.createElement('div');
  dot.className = 'branch-dot';
  dot.style.background = branch.color;
  dot.style.boxShadow = `0 0 6px ${branch.color}88`;

  const name = document.createElement('div');
  name.className = 'branch-name';
  name.style.color = branch.color;
  name.textContent = branch.name;

  const sub = document.createElement('div');
  sub.className = 'branch-sub';
  sub.textContent = branch.sub;

  const toggle = document.createElement('div');
  toggle.className = 'branch-toggle';
  toggle.textContent = '▶';

  header.appendChild(dot);
  header.appendChild(name);
  header.appendChild(sub);
  header.appendChild(toggle);

  const body = document.createElement('div');
  body.className = 'branch-body';

  const subBranches = document.createElement('div');
  subBranches.className = 'sub-branches';

  branch.children.forEach(group => {
    subBranches.appendChild(buildSubBranch(group, branch.color));
  });

  body.appendChild(subBranches);

  header.addEventListener('click', () => {
    el.classList.toggle('open');
  });

  el.appendChild(header);
  el.appendChild(body);
  return el;
}

const container = document.getElementById('branches');
data.forEach(branch => {
  container.appendChild(buildBranch(branch));
});
</script>

function buildMemoCard(item) {
  const card = document.createElement('div');
  card.style.cssText = 'border:1px solid #2a2a38;border-radius:4px;overflow:hidden;';

  // Header
  const header = document.createElement('div');
  header.style.cssText = 'display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;background:#16161d;transition:background 0.15s;';
  header.addEventListener('mouseenter', () => header.style.background = '#1e1e28');
  header.addEventListener('mouseleave', () => { if (!card.classList.contains('open')) header.style.background = '#16161d'; });

  const formEl = document.createElement('div');
  formEl.style.cssText = 'font-family:"DM Mono",monospace;font-size:1rem;color:#c9a96e;min-width:180px;letter-spacing:0.04em;';
  formEl.textContent = item.form;

  const labelEl = document.createElement('div');
  labelEl.style.cssText = 'font-size:0.85rem;color:#a8a5c0;flex:1;';
  labelEl.textContent = item.label;

  const levelEl = document.createElement('span');
  const levelColors = { '頻出': '#7ec98f', '中級': '#7eb8c9', '専門': '#b87eb8' };
  levelEl.style.cssText = `font-family:"DM Mono",monospace;font-size:0.7rem;padding:2px 8px;border-radius:2px;border:1px solid ${levelColors[item.level] || '#55526a'}55;color:${levelColors[item.level] || '#55526a'};background:${levelColors[item.level] || '#55526a'}11;`;
  levelEl.textContent = item.level;

  const toggle = document.createElement('div');
  toggle.style.cssText = 'font-family:"DM Mono",monospace;font-size:0.8rem;color:#55526a;transition:transform 0.2s;width:14px;text-align:center;';
  toggle.textContent = '▶';

  header.appendChild(formEl);
  header.appendChild(labelEl);
  header.appendChild(levelEl);
  header.appendChild(toggle);

  // Body
  const body = document.createElement('div');
  body.style.cssText = 'display:none;border-top:1px solid #2a2a38;background:#0f0f13;';

  // Origin
  const originEl = document.createElement('div');
  originEl.style.cssText = 'padding:10px 18px 0;font-family:"DM Mono",monospace;font-size:0.74rem;color:#55526a;letter-spacing:0.04em;';
  originEl.textContent = '語源：' + item.origin;
  body.appendChild(originEl);

  // Summary
  const summaryEl = document.createElement('div');
  summaryEl.style.cssText = 'padding:12px 18px;font-size:0.84rem;color:#c8c6d8;line-height:1.8;border-bottom:1px solid #2a2a38;';
  summaryEl.textContent = item.summary;
  body.appendChild(summaryEl);

  // Detail
  const detailEl = document.createElement('div');
  detailEl.style.cssText = 'padding:14px 18px;font-size:0.8rem;color:#8884a0;line-height:1.9;border-bottom:1px solid #2a2a38;white-space:pre-line;';
  detailEl.textContent = item.detail;
  body.appendChild(detailEl);

  // Examples
  const exWrap = document.createElement('div');
  exWrap.style.cssText = 'padding:14px 18px 18px;display:flex;flex-direction:column;gap:8px;';

  const exLabel = document.createElement('div');
  exLabel.style.cssText = 'font-family:"DM Mono",monospace;font-size:0.7rem;color:#55526a;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;';
  exLabel.textContent = '例';
  exWrap.appendChild(exLabel);

  item.examples.forEach(ex => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;';

    const wordEl = document.createElement('div');
    wordEl.style.cssText = 'font-family:"DM Mono",monospace;font-size:0.85rem;color:#c9a96e;min-width:200px;letter-spacing:0.03em;';
    wordEl.textContent = ex.word;

    const bdEl = document.createElement('div');
    bdEl.style.cssText = 'font-size:0.78rem;color:#6663808;color:#7774a0;line-height:1.6;';
    bdEl.textContent = ex.breakdown;

    row.appendChild(wordEl);
    row.appendChild(bdEl);
    exWrap.appendChild(row);
  });
  body.appendChild(exWrap);

  header.addEventListener('click', () => {
    const isOpen = card.classList.toggle('open');
    body.style.display = isOpen ? 'block' : 'none';
    toggle.style.transform = isOpen ? 'rotate(90deg)' : '';
    header.style.background = isOpen ? '#1e1e28' : '#16161d';
  });

  card.appendChild(header);
  card.appendChild(body);
  return card;
}

const memoList = document.getElementById('memo-list');
memoData.forEach(item => memoList.appendChild(buildMemoCard(item)));
</script>
