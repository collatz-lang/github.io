<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIE形態素索引</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d; --surface: #141414; --surface2: #1c1c1c; --border: #2a2a2a;
  --text: #e8e4dc; --muted: #7a7570;
  --accent-pie: #6ec8c8; --accent-prefix: #c8a96e; --accent-root: #6e9fc8; --accent-suffix: #6ec88a;
  --mono: 'DM Mono', monospace; --serif: 'Playfair Display', serif; --sans: 'Noto Sans JP', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); font-weight:300; line-height:1.7; min-height:100vh; }

header { padding:60px 60px 48px; border-bottom:1px solid var(--border); position:relative; overflow:hidden; }
header::before { content:'PIE'; position:absolute; right:-10px; top:50%; transform:translateY(-50%); font-family:var(--serif); font-size:180px; font-weight:700; color:rgba(110,200,200,0.04); letter-spacing:-6px; pointer-events:none; }
header h1 { font-family:var(--serif); font-size:42px; font-weight:700; color:var(--accent-pie); letter-spacing:-1px; margin-bottom:8px; }
header p { font-family:var(--mono); font-size:12px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:24px; }
.stats { display:flex; gap:32px; }
.stat-num { font-family:var(--serif); font-size:28px; font-weight:700; color:var(--text); line-height:1; display:block; }
.stat-label { font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }

.controls { display:none; }
.ctrl-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.search-wrap { position:relative; flex:1; max-width:320px; min-width:160px; }
#searchInput { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:3px; color:var(--text); font-family:var(--mono); font-size:12px; padding:6px 28px 6px 10px; outline:none; transition:border-color 0.2s; }
#searchInput:focus { border-color:var(--accent-pie); }
#searchInput::placeholder { color:var(--muted); }
#clearBtn { position:absolute; right:6px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer; font-size:11px; display:none; padding:2px 4px; }
.ctrl-btns { display:flex; gap:4px; flex-wrap:wrap; }
.cbtn { font-family:var(--mono); font-size:10px; letter-spacing:1px; padding:4px 10px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; border-radius:2px; transition:all 0.15s; white-space:nowrap; }
.cbtn:hover { color:var(--text); border-color:var(--text); }
.cbtn.active { background:var(--surface2); color:var(--text); border-color:var(--text); }
.cbtn[data-f="prefix"].active { color:var(--accent-prefix); border-color:var(--accent-prefix); }
.cbtn[data-f="root"].active { color:var(--accent-root); border-color:var(--accent-root); }
.cbtn[data-f="suffix"].active { color:var(--accent-suffix); border-color:var(--accent-suffix); }
.cbtn[data-m="orig"].active, .cbtn[data-m="examples"].active { color:var(--accent-pie); border-color:var(--accent-pie); }
.hint { font-family:var(--mono); font-size:11px; color:var(--muted); margin-left:auto; }
.ctrl-sep { font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:1px; white-space:nowrap; }

main { max-width:1000px; margin:0 auto; padding:40px 60px 80px; }

.root-item { border-bottom:1px solid rgba(42,42,42,0.6); }
.root-header { display:flex; align-items:center; gap:14px; padding:14px 4px; cursor:pointer; user-select:none; border-radius:3px; transition:background 0.15s; }
.root-header:hover { background:var(--surface); }
.root-form { font-family:var(--mono); font-size:16px; font-weight:500; color:var(--accent-pie); min-width:140px; letter-spacing:0.03em; }
.root-meaning { font-size:13px; color:var(--muted); flex:1; }
.root-count { font-family:var(--mono); font-size:10px; color:var(--muted); padding:2px 8px; border:1px solid var(--border); border-radius:2px; white-space:nowrap; }
.root-count.multi { color:var(--accent-pie); border-color:rgba(110,200,200,0.4); background:rgba(110,200,200,0.06); }
.root-toggle { font-family:var(--mono); font-size:10px; color:var(--muted); transition:transform 0.2s; flex-shrink:0; }
.root-item.open .root-toggle { transform:rotate(90deg); }
.root-body { display:none; padding:4px 0 16px 20px; border-left:1px solid var(--border); margin-left:8px; margin-bottom:4px; }
.root-item.open .root-body { display:flex; flex-direction:column; gap:8px; }

.morpheme-card { background:var(--surface); border:1px solid var(--border); border-radius:3px; padding:12px 16px; display:grid; grid-template-columns:auto auto 1fr; gap:4px 12px; align-items:baseline; transition:border-color 0.15s; }
.morpheme-card:hover { border-color:var(--muted); }
.mc-form { font-family:var(--mono); font-size:14px; font-weight:500; grid-column:1; grid-row:1; }
.mc-form.prefix { color:var(--accent-prefix); }
.mc-form.root   { color:var(--accent-root); }
.mc-form.suffix { color:var(--accent-suffix); }
.mc-type { font-family:var(--mono); font-size:9px; letter-spacing:1px; padding:2px 6px; border-radius:2px; border:1px solid; white-space:nowrap; grid-column:2; grid-row:1; align-self:center; }
.mc-type.prefix { color:var(--accent-prefix); border-color:rgba(200,169,110,0.4); background:rgba(200,169,110,0.06); }
.mc-type.root   { color:var(--accent-root);   border-color:rgba(110,159,200,0.4); background:rgba(110,159,200,0.06); }
.mc-type.suffix { color:var(--accent-suffix); border-color:rgba(110,200,138,0.4); background:rgba(110,200,138,0.06); }
.mc-meaning { font-size:13px; color:var(--text); grid-column:3; grid-row:1; }
.mc-pie { grid-column:1 / -1; font-family:var(--mono); font-size:11px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; padding-top:2px; }
.pie-root { color:var(--muted); }
.compound-current { color:var(--accent-pie); background:rgba(110,200,200,0.1); padding:1px 6px; border-radius:2px; border:1px solid rgba(110,200,200,0.35); }
.compound-other { color:var(--accent-pie); opacity:0.5; padding:1px 6px; border-radius:2px; border:1px solid rgba(110,200,200,0.2); }
.pie-plus { color:var(--muted); font-size:12px; }
.mc-orig { grid-column:1 / -1; font-family:var(--mono); font-size:10px; color:var(--muted); padding-top:6px; border-top:1px solid var(--border); }
.mc-ex { grid-column:1 / -1; font-size:12px; color:var(--muted); font-style:italic; }

mark.hl { background:rgba(110,200,200,0.25); color:var(--accent-pie); border-radius:2px; padding:0 1px; }

.child-group-wrap { display:flex; flex-direction:column; gap:0; border-left:2px solid rgba(110,200,200,0.2); margin-left:12px; }
.root-child { border-bottom:1px solid rgba(42,42,42,0.6); overflow:hidden; }
.root-child:last-child { border-bottom:none; }
.root-child > .root-header { background:transparent; padding:10px 14px 10px 12px; }
.root-child > .root-header .root-form { font-size:13px; color:rgba(110,200,200,0.75); }
.root-child > .root-body { display:none !important; padding:4px 0 10px 16px; border-left:1px solid var(--border); margin-left:6px; margin-bottom:4px; }
.root-child.open > .root-body { display:flex !important; flex-direction:column; gap:8px; }
.root-parent-header { cursor:pointer; }

/* タブ */
.tab-bar { position:sticky; top:0; z-index:100; display:flex; border-bottom:1px solid var(--border); background:rgba(13,13,13,0.95); backdrop-filter:blur(10px); padding:0 20px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.tab-btn { font-family:var(--mono); font-size:11px; letter-spacing:2px; text-transform:uppercase; padding:14px 20px; background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); cursor:pointer; margin-bottom:-1px; transition:all 0.2s; white-space:nowrap; flex-shrink:0; }
.tab-btn.active { color:var(--accent-pie); border-bottom-color:var(--accent-pie); }
.tab-btn:hover { color:var(--text); }

/* ナビバー検索 */
.nav-search-wrap { position:relative; margin-left:auto; display:flex; align-items:center; flex-shrink:0; padding:0 4px; }
#searchInputTop { background:rgba(255,255,255,0.06); border:1px solid var(--border); border-radius:3px; color:var(--text); font-family:var(--mono); font-size:12px; padding:5px 24px 5px 10px; outline:none; width:90px; transition:border-color 0.2s, width 0.2s; }
#searchInputTop:focus { border-color:var(--accent-pie); width:140px; }
#searchInputTop::placeholder { color:var(--muted); }
#clearBtnTop { position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer; font-size:11px; display:none; padding:2px 4px; }
#hintTop { font-family:var(--mono); font-size:10px; color:var(--muted); white-space:nowrap; padding:0 8px; }

/* FAB */
#fab { position:fixed; bottom:28px; right:20px; z-index:200; width:48px; height:48px; border-radius:50%; background:var(--surface2); border:1px solid var(--border); color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 16px rgba(0,0,0,0.5); transition:all 0.2s; }
#fab:hover { border-color:var(--accent-pie); color:var(--accent-pie); }
#fab.open { background:var(--accent-pie); color:#0d0d0d; border-color:var(--accent-pie); }
#fabOverlay { position:fixed; inset:0; z-index:150; background:rgba(0,0,0,0.5); opacity:0; pointer-events:none; transition:opacity 0.25s; }
#fabOverlay.show { opacity:1; pointer-events:all; }
#fabSheet { position:fixed; bottom:0; left:0; right:0; z-index:160; background:var(--surface); border-top:1px solid var(--border); border-radius:16px 16px 0 0; padding:12px 20px 40px; transform:translateY(100%); transition:transform 0.3s cubic-bezier(0.32,0.72,0,1); max-height:80vh; overflow-y:auto; }
#fabSheet.show { transform:translateY(0); }
.sheet-handle { width:36px; height:4px; border-radius:2px; background:var(--border); margin:0 auto 16px; }
.sheet-section { margin-bottom:18px; }
.sheet-label { font-size:10px; letter-spacing:2px; color:var(--muted); font-family:var(--mono); margin-bottom:8px; text-transform:uppercase; }
.sheet-row { display:flex; gap:8px; flex-wrap:wrap; }
.s-btn { font-family:var(--mono); font-size:11px; letter-spacing:1px; padding:6px 16px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; border-radius:2px; transition:all 0.15s; }
.s-btn:hover { border-color:var(--text); color:var(--text); }
.s-btn.active { background:var(--accent-pie); color:#0d0d0d; border-color:var(--accent-pie); }

/* グループビュー */
#groupView { max-width:1000px; margin:0 auto; padding:40px 60px 80px; display:none; }
@media (max-width:768px) { #groupView { padding:24px 20px 60px; } }
.group-card { border:1px solid var(--border); border-radius:4px; overflow:hidden; margin-bottom:12px; }
.group-header { padding:14px 18px; display:flex; align-items:center; gap:12px; cursor:pointer; user-select:none; background:var(--surface); transition:background 0.15s; }
.group-header:hover { background:var(--surface2); }
.group-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.group-name { font-size:14px; font-weight:500; flex:1; }
.group-en { font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:1px; }
.group-toggle { font-family:var(--mono); font-size:10px; color:var(--muted); transition:transform 0.2s; flex-shrink:0; }
.group-card.open .group-toggle { transform:rotate(90deg); }
.group-body { display:none; border-top:1px solid var(--border); padding:14px 18px; }
.group-card.open .group-body { display:block; }
.g-entries { display:flex; flex-direction:column; gap:6px; }
.g-entry { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; padding:8px 12px; background:var(--surface2); border-radius:3px; border:1px solid transparent; transition:border-color 0.15s; }
.g-entry:hover { border-color:var(--border); }
.g-entry.search-match { border-color:rgba(110,200,200,0.4); background:rgba(110,200,200,0.05); }
.g-pie { font-family:var(--mono); font-size:12px; color:var(--accent-pie); min-width:140px; }
.g-forms { display:flex; gap:5px; flex-wrap:wrap; }
.g-form-tag { font-family:var(--mono); font-size:11px; padding:2px 8px; border-radius:2px; border:1px solid; white-space:nowrap; }
.g-form-tag.prefix { color:var(--accent-prefix); border-color:rgba(200,169,110,0.4); background:rgba(200,169,110,0.06); }
.g-form-tag.root   { color:var(--accent-root);   border-color:rgba(110,159,200,0.4); background:rgba(110,159,200,0.06); }
.g-form-tag.suffix { color:var(--accent-suffix); border-color:rgba(110,200,138,0.4); background:rgba(110,200,138,0.06); }
.g-multi { font-family:var(--mono); font-size:9px; padding:1px 5px; border-radius:2px; border:1px solid rgba(110,200,200,0.4); background:rgba(110,200,200,0.08); color:var(--accent-pie); white-space:nowrap; align-self:center; }
.g-note { font-size:11px; color:var(--muted); width:100%; margin-top:2px; }
mark.hl { background:rgba(110,200,200,0.25); color:var(--accent-pie); border-radius:2px; padding:0 1px; }


footer { border-top:1px solid var(--border); padding:24px 60px; font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:1px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; }

@media (max-width:768px) {
  header, main, footer, .controls { padding-left:20px; padding-right:20px; }
  header h1 { font-size:28px; }
  .root-form { min-width:100px; font-size:14px; }
}
</style>
</head>
<body>

<header>
  <h1>PIE形態素索引</h1>
  <p>Proto-Indo-European Morpheme Index</p>
  <div class="stats">
    <div><span class="stat-num" id="statRoots">—</span><span class="stat-label">PIE語根</span></div>
    <div><span class="stat-num" id="statEntries">—</span><span class="stat-label">形態素</span></div>
    <div><span class="stat-num" id="statMulti">—</span><span class="stat-label">複数対応</span></div>
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="roots">語根順</button>
  <button class="tab-btn" data-tab="groups">機能グループ</button>
  <div class="nav-search-wrap">
    <input id="searchInputTop" type="text" placeholder="検索…" autocomplete="off" spellcheck="false">
    <button id="clearBtnTop">✕</button>
  </div>
  <span id="hintTop"></span>
</div>

<!-- FAB -->
<button id="fab" aria-label="メニュー">
  <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><rect width="16" height="1.5" rx="0.75" fill="currentColor"/><rect y="5.25" width="16" height="1.5" rx="0.75" fill="currentColor"/><rect y="10.5" width="16" height="1.5" rx="0.75" fill="currentColor"/></svg>
</button>
<div id="fabOverlay"></div>
<div id="fabSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-section">
    <div class="sheet-label">検索対象</div>
    <div class="sheet-row" id="modeBtns">
      <button class="cbtn active" data-m="form">形態素</button>
      <button class="cbtn active" data-m="meaning">意味</button>
      <button class="cbtn active" data-m="pie">PIE語根</button>
      <button class="cbtn" data-m="orig">語源</button>
      <button class="cbtn" data-m="examples">例語</button>
    </div>
  </div>
  <div class="sheet-section">
    <div class="sheet-label">絞り込み</div>
    <div class="sheet-row" id="filterBtns">
      <button class="cbtn active" data-f="all">すべて</button>
      <button class="cbtn" data-f="multi">複数対応</button>
      <button class="cbtn" data-f="compound">複合</button>
      <button class="cbtn" data-f="prefix">接頭辞</button>
      <button class="cbtn" data-f="root">語根</button>
      <button class="cbtn" data-f="suffix">接尾辞</button>
    </div>
  </div>
</div>

<main id="main"></main>
<div id="groupView"></div>

<footer>
  <span>PIE Morpheme Index — english_morphology より自動生成</span>
  <span>印欧祖語の再建形はすべて仮説に基づく</span>
</footer>

const TYPE_LABEL = {prefix:'接頭辞', root:'語根', suffix:'接尾辞'};

function extractMeaning(pie) {
  const m = pie.match(/（([^）]+)）/);
  return m ? m[1].replace(/[→←].*/,'').trim() : '';
}
function escapeRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function highlight(text, query) {
  if (!query) return text;
  return text.replace(new RegExp('(' + escapeRe(query) + ')', 'gi'), '<mark class="hl">$1</mark>');
}

function buildCard(entry, currentRoot, query, modes) {
  const card = document.createElement('div');
  card.className = 'morpheme-card';

  const formEl = document.createElement('div');
  formEl.className = 'mc-form ' + entry.type;
  formEl.textContent = entry.form;

  const typeEl = document.createElement('div');
  typeEl.className = 'mc-type ' + entry.type;
  typeEl.textContent = TYPE_LABEL[entry.type];

  const meaningEl = document.createElement('div');
  meaningEl.className = 'mc-meaning';
  meaningEl.innerHTML = highlight(entry.meaning, query);

  card.appendChild(formEl);
  card.appendChild(typeEl);
  card.appendChild(meaningEl);

  // PIE語根表示
  const pieEl = document.createElement('div');
  pieEl.className = 'mc-pie';
  if (entry.is_compound && entry.pie_roots.length > 1) {
    entry.pie_roots.forEach((root, i) => {
      if (i > 0) {
        const plus = document.createElement('span');
        plus.className = 'pie-plus';
        plus.textContent = '+';
        pieEl.appendChild(plus);
      }
      const rootEl = document.createElement('span');
      rootEl.className = root === currentRoot ? 'compound-current' : 'compound-other';
      rootEl.innerHTML = highlight(root, query);
      pieEl.appendChild(rootEl);
    });
  } else {
    const rootEl = document.createElement('span');
    rootEl.className = 'pie-root';
    rootEl.innerHTML = highlight(entry.pie_roots[0] || '', query);
    pieEl.appendChild(rootEl);
  }
  card.appendChild(pieEl);

  if (entry.orig) {
    const origEl = document.createElement('div');
    origEl.className = 'mc-orig';
    origEl.innerHTML = highlight(entry.orig, query);
    card.appendChild(origEl);
  }
  if (entry.examples) {
    const exEl = document.createElement('div');
    exEl.className = 'mc-ex';
    exEl.innerHTML = highlight(entry.examples, query);
    card.appendChild(exEl);
  }

  return card;
}

// rootをキーにしたマップ
const DATA_MAP = Object.fromEntries(DATA.map(item => [item.root, item]));

function buildItem(item, query, isChild) {
  const div = document.createElement('div');
  div.className = isChild ? 'root-item root-child' : 'root-item';

  const children = DATA.filter(d => d.parent === item.root);
  const directCount = item.entries.length;
  const childCount = children.reduce((s, c) => s + c.entries.length, 0);
  const isMulti = directCount > 1 || childCount > 0;

  const meaning = extractMeaning(item.entries[0]?.pie || '');

  if (isChild) {
    // 子グループ：ヘッダーはアコーディオン
    const header = document.createElement('div');
    header.className = 'root-header';
    header.innerHTML = `
      <div class="root-form">${highlight(item.root, query)}</div>
      <div class="root-meaning">${highlight(meaning, query)}</div>
      <div class="root-count${directCount > 1 ? ' multi' : ''}">${directCount} 形態素</div>
      <div class="root-toggle">▶</div>
    `;
    const body = document.createElement('div');
    body.className = 'root-body';
    item.entries.forEach(e => body.appendChild(buildCard(e, item.root, query)));
    header.addEventListener('click', () => div.classList.toggle('open'));
    div.appendChild(header);
    div.appendChild(body);
  } else {
    // 親グループ：ヘッダーは常時表示、直接エントリーはアコーディオン
    const header = document.createElement('div');
    header.className = 'root-header root-parent-header';
    header.innerHTML = `
      <div class="root-form">${highlight(item.root, query)}</div>
      <div class="root-meaning">${highlight(meaning, query)}</div>
      <div class="root-count${isMulti ? ' multi' : ''}">${directCount + childCount} 形態素</div>
      ${directCount > 0 ? '<div class="root-toggle">▶</div>' : '<div style="width:14px"></div>'}
    `;

    // 直接エントリーがあればアコーディオン
    if (directCount > 0) {
      const body = document.createElement('div');
      body.className = 'root-body';
      item.entries.forEach(e => body.appendChild(buildCard(e, item.root, query)));
      header.addEventListener('click', () => div.classList.toggle('open'));
      div.appendChild(header);
      div.appendChild(body);
    } else {
      div.appendChild(header);
    }

    // 子グループは常時表示
    if (children.length > 0) {
      const childWrap = document.createElement('div');
      childWrap.className = 'child-group-wrap';
      children.forEach(child => childWrap.appendChild(buildItem(child, query, true)));
      div.appendChild(childWrap);
    }
  }

  return div;
}

const mainEl = document.getElementById('main');
let currentFilter = new Set(['all']);
let currentQuery = '';
let activeModes = new Set(['form', 'meaning', 'pie']);

function matchEntry(entry, q) {
  if (activeModes.has('form')     && entry.form.toLowerCase().includes(q)) return true;
  if (activeModes.has('meaning')  && entry.meaning.toLowerCase().includes(q)) return true;
  if (activeModes.has('pie')      && entry.pie.toLowerCase().includes(q)) return true;
  if (activeModes.has('orig')     && entry.orig.toLowerCase().includes(q)) return true;
  if (activeModes.has('examples') && entry.examples.toLowerCase().includes(q)) return true;
  return false;
}

function itemMatches(item, q) {
  if (!q) return true;
  const rootMatch = activeModes.has('pie') && item.root.toLowerCase().includes(q);
  const entryMatch = item.entries.some(e => matchEntry(e, q));
  // 子グループにマッチするものがあればその親もマッチ
  const childMatch = DATA.filter(d => d.parent === item.root).some(c => itemMatches(c, q));
  return rootMatch || entryMatch || childMatch;
}

function render() {
  mainEl.innerHTML = '';
  const q = currentQuery.toLowerCase();
  let visible = 0;

  DATA.forEach(item => {
    // 子グループは親の中に入れるのでトップレベルでは表示しない
    if (item.parent) return;

    const allF = currentFilter.has('all');
    if (!allF && currentFilter.has('multi')    && item.entries.length < 2) return;
    if (!allF && currentFilter.has('compound') && !item.entries.some(e => e.is_compound)) return;
    if (!allF) {
      const types = new Set(item.entries.map(e => e.type));
      const wantsPrefix = currentFilter.has('prefix');
      const wantsRoot   = currentFilter.has('root');
      const wantsSuffix = currentFilter.has('suffix');
      const typeFilter  = wantsPrefix || wantsRoot || wantsSuffix;
      if (typeFilter && !( (wantsPrefix && types.has('prefix')) || (wantsRoot && types.has('root')) || (wantsSuffix && types.has('suffix')) )) return;
    }

    if (!itemMatches(item, q)) return;

    const el = buildItem(item, q, false);
    if (q) el.classList.add('open');
    mainEl.appendChild(el);
    visible++;
  });

  document.getElementById('hintTop').textContent =
    (q || !currentFilter.has('all')) ? visible + ' 件表示' : '';
}

function openSheet() { fabSheet.classList.add('show'); fabOverlay.classList.add('show'); fab.classList.add('open'); fab.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><line x1="1" y1="1" x2="11" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="11" y1="1" x2="1" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>'; }

// 検索モード
document.querySelectorAll('#modeBtns .cbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    const m = btn.dataset.m;
    btn.classList.toggle('active');
    if (btn.classList.contains('active')) {
      activeModes.add(m);
    } else {
      activeModes.delete(m);
      if (activeModes.size === 0) {
        // 最低1つはactive
        btn.classList.add('active');
        activeModes.add(m);
      }
    }
    render();
  });
});

// フィルタ
document.querySelectorAll('#filterBtns .cbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.f;
    if (f === 'all') {
      currentFilter = new Set(['all']);
    } else {
      currentFilter.delete('all');
      if (currentFilter.has(f)) {
        currentFilter.delete(f);
        if (currentFilter.size === 0) currentFilter.add('all');
      } else {
        currentFilter.add(f);
      }
    }
    document.querySelectorAll('#filterBtns .cbtn').forEach(b => {
      b.classList.toggle('active',
        currentFilter.has(b.dataset.f) || (currentFilter.has('all') && b.dataset.f === 'all'));
    });
    render();
  });
});

function escapeReG(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function hlG(text, q) {
  if (!q) return text;
  return text.replace(new RegExp('(' + escapeReG(q) + ')', 'gi'), '<mark class="hl">$1</mark>');
}

let _groupViewBuilt = false;
function buildGroupView(q) {
  const container = document.getElementById('groupView');
  const sq = (q || '').toLowerCase();

  // 検索なしの初回ビルドはキャッシュ
  if (!sq && _groupViewBuilt) return;
  if (!sq) _groupViewBuilt = true;

  container.innerHTML = '';

  GROUPS.forEach(g => {
    // g.roots配列からDATAを参照してエントリーを収集
    const items = (g.roots || []).map(r => DATA_MAP[r]).filter(Boolean);

    // 各itemのentriesを一覧化（形態素カード形式）
    const allEntries = [];
    items.forEach(item => {
      item.entries.forEach(e => allEntries.push({ item, entry: e }));
      // 子グループのエントリーも含める
      DATA.filter(d => d.parent === item.root).forEach(child => {
        child.entries.forEach(e => allEntries.push({ item: child, entry: e }));
      });
    });

    const matched = allEntries.filter(({ item, entry: e }) => {
      if (!sq) return true;
      return item.root.toLowerCase().includes(sq) ||
             e.form.toLowerCase().includes(sq) ||
             e.meaning.toLowerCase().includes(sq) ||
             e.pie.toLowerCase().includes(sq) ||
             e.examples.toLowerCase().includes(sq);
    });

    if (sq && matched.length === 0) return;

    const card = document.createElement('div');
    card.className = 'group-card';
    if (sq) card.classList.add('open');

    const count = (sq ? matched : allEntries).length;
    const header = document.createElement('div');
    header.className = 'group-header';
    header.innerHTML = `
      <div class="group-dot" style="background:${g.color}; box-shadow:0 0 6px ${g.color}55;"></div>
      <div class="group-name" style="color:${g.color};">${g.name}</div>
      <div class="group-en">${g.en}</div>
      <div class="root-count${count > 3 ? ' multi' : ''}" style="margin-left:auto;">${count} 形態素</div>
      <div class="group-toggle">▶</div>
    `;

    const body = document.createElement('div');
    body.className = 'group-body';
    const entriesEl = document.createElement('div');
    entriesEl.className = 'g-entries';

    (sq ? matched : allEntries).forEach(({ item, entry: e }) => {
      const row = document.createElement('div');
      row.className = 'g-entry' + (sq ? ' search-match' : '');

      // PIE語根
      const pieEl = document.createElement('div');
      pieEl.className = 'g-pie';
      pieEl.innerHTML = hlG(item.root, sq);
      row.appendChild(pieEl);

      // 形態素形式とタイプ
      const formsEl = document.createElement('div');
      formsEl.className = 'g-forms';
      const tag = document.createElement('span');
      tag.className = 'g-form-tag ' + e.type;
      tag.innerHTML = hlG(e.form, sq);
      formsEl.appendChild(tag);
      row.appendChild(formsEl);

      // 意味
      const meaningEl = document.createElement('div');
      meaningEl.className = 'g-note';
      meaningEl.innerHTML = hlG(e.meaning, sq);
      row.appendChild(meaningEl);

      entriesEl.appendChild(row);
    });

    body.appendChild(entriesEl);
    header.addEventListener('click', () => card.classList.toggle('open'));
    card.appendChild(header);
    card.appendChild(body);
    container.appendChild(card);
  });
}
